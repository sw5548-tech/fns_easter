<!DOCTYPE html>
<html>
<head>
  <title>Coloring Page</title>
  <style>
body {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(to bottom, #f5f7fb, #e6ecf5);
  text-align: center;
}

/* Headings */
h2 {
  margin-top: 30px;
  font-size: 28px;
  color: #333;
}

h3 {
  margin-top: 40px;
  color: #555;
}

/* Canvas area */
#canvas {
  background: white;
  display: inline-block;
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* SVG size */
svg {
  width: 300px;
}

/* Color palette */
#palette {
  margin-top: 20px;
}

.color-btn {
  width: 35px;
  height: 35px;
  display: inline-block;
  margin: 6px;
  cursor: pointer;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}

.color-btn:hover {
  transform: scale(1.2);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Color picker */
#picker {
  margin-top: 15px;
  width: 60px;
  height: 40px;
  border: 2px solid #fff;
  cursor: pointer;
}

/* Forms */
form {
  margin-top: 20px;
}

input, textarea {
  width: 250px;
  padding: 8px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  height: 80px;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: #4a6cf7;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

button:hover {
  background: #3a55d1;
  transform: translateY(-2px);
}

/* Coloring effect */
.colorable {
  cursor: pointer;
  transition: fill 0.2s;
}
  </style>
</head>

<body>

<h2>Simple Coloring Page</h2>

<!-- Color palette -->
<div id="palette">
  <div class="color-btn" style="background:red" onclick="setColor('red')"></div>
  <div class="color-btn" style="background:blue" onclick="setColor('blue')"></div>
  <div class="color-btn" style="background:green" onclick="setColor('green')"></div>
  <div class="color-btn" style="background:yellow" onclick="setColor('yellow')"></div>
</div>

<!-- Color picker -->
<input type="color" id="picker" value="#ff0000">

<br>

<!-- ✅ Proper SVG -->

<div id="canvas"></div>

<h3>We will send your image to your email</h3>
<!-- send directly to the visitor -->
<form id="emailForm">
  <label>
    Your email:
    <input type="email" id="email" required>
  </label>

  <button type="submit">Send me my drawing</button>
</form>

<h3>Please leave a comment</h3>
<!-- formspree leave comment section -->
<form
  action="https://formspree.io/f/mojkgqyj"
  method="POST"
>
  <label>
    Your email:
    <input type="email" name="email">
  </label>
  <br>
    <br>
  <label>
    Your message:
    <textarea name="message"></textarea>
  </label>
    <br>
  <!-- your other form fields go here -->
  <button type="submit">Send</button>
</form>

<h3>download the image</h3>
<button onclick="downloadPNG()">Download Image</button>

<script>

// ✅ Step 1: Convert SVG → PNG (in browser)
function getSVGData() {
  const svg = document.querySelector("#canvas svg");
  const serializer = new XMLSerializer();
  return serializer.serializeToString(svg);
}

function svgToPNG(callback) {
  const svgData = getSVGData();
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);

  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const pngData = canvas.toDataURL("image/png");
    callback(pngData);

    URL.revokeObjectURL(url);
  };

  img.src = url;
}

//✅ Step 3: Handle submit
document.getElementById("emailForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;

  svgToPNG((pngData) => {
    // 🚨 This is where backend is needed
    fetch("YOUR_BACKEND_ENDPOINT", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        image: pngData
      })
    })
    .then(res => res.json())
    .then(() => alert("Sent! Check your email"))
    .catch(() => alert("Error sending email"));
  });
});

//or download (for now)
function downloadPNG() {
  svgToPNG((pngData) => {
    const link = document.createElement("a");
    link.href = pngData;
    link.download = "my-coloring.png";
    link.click();
  });
}

// random images 
function loadRandomSVG() {
  const randomIndex = Math.floor(Math.random() * svgs.length);
  document.getElementById("canvas").innerHTML = svgs[randomIndex];

  // ✅ attach AFTER inserting
  document.querySelectorAll(".colorable").forEach(el => {
    el.addEventListener("click", () => {
      el.setAttribute("fill", currentColor);
    });
  });
}

window.onload = () => {
  loadRandomSVG();
};

// Color picker
document.getElementById("picker").addEventListener("input", (e) => {
  currentColor = e.target.value;
});

// Palette
function setColor(color) {
  currentColor = color;
}
